<!DOCTYPE html>
<html>
<head>
  <title>Columbina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

/* Disable hover effects on mobile */
@media (hover: none) {
  .glass:hover {
    transform: none;
    box-shadow: none;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* remove cursor fully on phone */
  .cursor-core,
  .cursor-trail {
    display: none !important;
  }

  body {
    cursor: auto !important;
  }
}

#moon-transition {
  filter: blur(0px);
  transition: opacity 1.2s ease, filter 1.2s ease;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, 
    rgba(255, 245, 200, 0.9) 0%, 
    rgba(10,10,30,1) 60%, 
    black 100%);
  z-index: 2000;
  opacity: 1;
  pointer-events: none;
}

/* cursor only on PC */
@media (hover: hover) and (pointer: fine) {
  body {
    cursor: none;
  }
}

.cursor-core {
  position: fixed;
  width: 12px;
  height: 12px;
  background: #fffde7;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  box-shadow:
    0 0 8px #fff9c4,
    0 0 18px #fff59d,
    0 0 35px rgba(255, 245, 157, 0.8);
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease;
}

.cursor-trail {
  position: fixed;
  width: 8px;
  height: 8px;
  background: rgba(255, 245, 157, 0.6);
  border-radius: 50%;
  pointer-events: none;
  z-index: 998;
  filter: blur(1.5px);
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0a0a1a, #000);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 42px;
  color: #c084fc;
  text-shadow: 0 0 25px #a855f7;
}

.image-box {
  display: flex;
  justify-content: center;
  margin: 30px 0;
}

.image-box img {
  width: 260px;
  border-radius: 20px;
  box-shadow: 0 0 40px #a855f7;
}

.toggle {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.btn {
  padding: 10px 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
}

.active {
  background: #a855f7;
}

.section {
  display: none;
}

.show {
  display: block;
}

.glass {
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(14px);
  border: 1px solid rgba(168,85,247,0.3);
}

.scroll {
  max-height: 260px;
  overflow-y: auto;
}

.back {
  display: inline-block;
  padding: 10px 18px;
  border-radius: 20px;
  background: rgba(168,85,247,0.2);
  border: 1px solid rgba(168,85,247,0.5);
  color: #c084fc;
  text-decoration: none;
}

  </style>
</head>

<body>

<div id="moon-transition"></div>

<!-- cursor created ONLY on PC -->
<script>
const isPC = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
if (isPC) {
  document.write('<div class="cursor-core"></div>');
}
</script>

<div class="container">

<h1>Columbina 🌙</h1>

<div class="image-box">
  <img src="columbina.png" loading="lazy">
</div>

<div class="toggle">
  <div class="btn active" onclick="showSection('gameplay')">Gameplay</div>
  <div class="btn" onclick="showSection('lore')">Lore</div>
</div>

<!-- ================= LORE ================= -->
<div id="lore" class="section">
  <!-- YOUR FULL ORIGINAL LORE CONTENT (UNCHANGED) -->
</div>

<!-- ================= GAMEPLAY ================= -->
<div id="gameplay" class="section show">
  <!-- YOUR FULL ORIGINAL GAMEPLAY CONTENT (UNCHANGED) -->
</div>

<div class="glass">
  <a href="index.html" class="back">⬅ Back</a>
</div>

</div>

<script>

function showSection(id) {
  let sections = document.querySelectorAll('.section');
  let buttons = document.querySelectorAll('.btn');

  sections.forEach(s => s.classList.remove('show'));
  buttons.forEach(b => b.classList.remove('active'));

  document.getElementById(id).classList.add('show');
  event.target.classList.add('active');
}

/* cursor logic ONLY for PC */
if (isPC) {
  const core = document.querySelector(".cursor-core");

  document.addEventListener("mousemove", (e) => {
    core.style.left = e.clientX + "px";
    core.style.top = e.clientY + "px";

    let t = document.createElement("div");
    t.className = "cursor-trail";
    t.style.left = e.clientX + "px";
    t.style.top = e.clientY + "px";

    document.body.appendChild(t);
    setTimeout(() => t.remove(), 300);
  });
}

window.addEventListener("load", () => {
  const moon = document.getElementById("moon-transition");

  setTimeout(() => {
    moon.style.opacity = "0";
    moon.style.filter = "blur(30px)";
    setTimeout(() => moon.remove(), 1200);
  }, 200);
});

</script>

</body>
</html>
