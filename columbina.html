<!DOCTYPE html>
<html>
<head>
  <title>Columbina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

/* Disable hover effects on mobile */
@media (hover: none) {
  .glass:hover {
    transform: none;
    box-shadow: none;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* REMOVE cursor completely on phones */
  .cursor-core,
  .cursor-trail {
    display: none !important;
  }

  body {
    cursor: auto !important;
  }
}

#moon-transition {
  transition: opacity 1.2s ease, filter 1.2s ease;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,245,200,0.9), #000);
  z-index: 2000;
}

/* ONLY PC cursor */
@media (hover: hover) and (pointer: fine) {
  body {
    cursor: none;
  }
}

.cursor-core {
  position: fixed;
  width: 12px;
  height: 12px;
  background: #fffde7;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  box-shadow: 0 0 20px #fff59d;
  transform: translate(-50%, -50%);
}

.cursor-trail {
  position: fixed;
  width: 8px;
  height: 8px;
  background: rgba(255,245,157,0.6);
  border-radius: 50%;
  pointer-events: none;
  z-index: 998;
  filter: blur(1.5px);
}

/* YOUR ORIGINAL DESIGN (UNCHANGED) */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0a0a1a, #000);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 42px;
  color: #c084fc;
}

.image-box {
  display: flex;
  justify-content: center;
  margin: 30px 0;
}

.image-box img {
  width: 260px;
  border-radius: 20px;
}

.toggle {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  padding: 10px 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
}

.active {
  background: #a855f7;
}

.section {
  display: none;
}

.show {
  display: block;
}

.glass {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.scroll {
  max-height: 260px;
  overflow-y: auto;
}

.back {
  display: inline-block;
  margin-top: 20px;
  color: #c084fc;
  text-decoration: none;
}

  </style>
</head>

<body>

<div id="moon-transition"></div>

<!-- ONLY CREATE CURSOR ON PC -->
<script>
const isPC = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
if (isPC) {
  document.write('<div class="cursor-core"></div>');
}
</script>

<div class="container">

<h1>Columbina 🌙</h1>

<div class="image-box">
  <img src="columbina.png">
</div>

<div class="toggle">
  <div class="btn active" onclick="showSection('gameplay')">Gameplay</div>
  <div class="btn" onclick="showSection('lore')">Lore</div>
</div>

<!-- KEEP YOUR FULL LORE HERE (UNCHANGED) -->
<div id="lore" class="section">
  <!-- PASTE YOUR FULL LORE CONTENT HERE EXACTLY -->
</div>

<!-- KEEP YOUR FULL GAMEPLAY HERE (UNCHANGED) -->
<div id="gameplay" class="section show">
  <!-- PASTE YOUR FULL GAMEPLAY CONTENT HERE EXACTLY -->
</div>

<a href="index.html" class="back">⬅ Back</a>

</div>

<script>

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('show');
  event.target.classList.add('active');
}

/* CURSOR ONLY ON PC */
if (isPC) {

  const core = document.querySelector(".cursor-core");

  document.addEventListener("mousemove", (e) => {
    core.style.left = e.clientX + "px";
    core.style.top = e.clientY + "px";

    let t = document.createElement("div");
    t.className = "cursor-trail";
    t.style.left = e.clientX + "px";
    t.style.top = e.clientY + "px";

    document.body.appendChild(t);
    setTimeout(() => t.remove(), 300);
  });

}

window.addEventListener("load", () => {
  const moon = document.getElementById("moon-transition");
  setTimeout(() => {
    moon.style.opacity = "0";
    moon.style.filter = "blur(30px)";
    setTimeout(() => moon.remove(), 1200);
  }, 200);
});

</script>

</body>
</html>
